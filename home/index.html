<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>inori | 管理画面</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Josefin+Sans:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>

<body>
  <div class="admin-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">
          <img src="../01/inori-logo.png" alt="inori logo" class="brand-logo" />
        </div>
        <div>
          <p class="brand-sub">Admin Console</p>
          <h1>inori</h1>
        </div>
      </div>

      <nav class="sidebar-nav">
        <button type="button" class="nav-link active" data-view="reservations">予約管理</button>
        <button type="button" class="nav-link" data-view="inquiries">お問い合わせ管理</button>
      </nav>

      <div class="sidebar-card">
        <p class="sidebar-label" id="sidebar-label">本日の予約</p>
        <strong id="sidebar-count">0件</strong>
        <span id="sidebar-caption">確認中</span>
      </div>
    </aside>

    <main class="main-content">
      <section class="content-view is-active" data-view-panel="reservations">
        <header class="page-header">
          <div>
            <p class="page-eyebrow">Dashboard</p>
            <h2>予約管理画面</h2>
            <p class="page-copy">予約情報の確認、検索、編集、キャンセル、削除をまとめて行えます。</p>
          </div>
          <button type="button" class="primary-btn" id="new-reservation-btn">新規予約</button>
        </header>

        <section class="toolbar-card">
          <div class="toolbar-grid">
            <div class="toolbar-field keyword-field">
              <label for="search-keyword">キーワード検索</label>
              <input type="text" id="search-keyword" placeholder="予約者名・メールアドレス・電話番号" />
            </div>
            <div class="toolbar-field">
              <label for="filter-date">日付絞り込み</label>
              <input type="date" id="filter-date" />
            </div>
            <div class="toolbar-field">
              <label for="filter-status">ステータス</label>
              <select id="filter-status">
                <option value="">すべて</option>
                <option value="予約確定">予約確定</option>
                <option value="仮予約">仮予約</option>
                <option value="来店済み">来店済み</option>
                <option value="キャンセル">キャンセル</option>
              </select>
            </div>
            <div class="toolbar-actions">
              <button type="button" class="secondary-btn" id="reset-filter-btn">条件をクリア</button>
            </div>
          </div>
        </section>

        <section class="table-card">
          <div class="table-header">
            <div>
              <h3>予約一覧</h3>
              <p id="reservation-result-count">0件を表示中</p>
            </div>
          </div>

          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>予約者名</th>
                  <th>予約日</th>
                  <th>時間</th>
                  <th>人数</th>
                  <th>ステータス</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="reservation-tbody"></tbody>
            </table>
          </div>

          <div class="pagination-bar">
            <button type="button" class="page-btn" id="reservation-prev-page">前へ</button>
            <div class="page-numbers" id="reservation-page-numbers"></div>
            <button type="button" class="page-btn" id="reservation-next-page">次へ</button>
          </div>
        </section>
      </section>

      <section class="content-view" data-view-panel="inquiries">
        <header class="page-header">
          <div>
            <p class="page-eyebrow">Support</p>
            <h2>お問い合わせ管理画面</h2>
            <p class="page-copy">お問い合わせ内容の確認、検索、ステータス変更、削除を行えます。</p>
          </div>
          <button type="button" class="primary-btn" id="new-inquiry-btn">新規登録</button>
        </header>

        <section class="toolbar-card">
          <div class="toolbar-grid">
            <div class="toolbar-field keyword-field">
              <label for="inquiry-search-keyword">キーワード検索</label>
              <input type="text" id="inquiry-search-keyword" placeholder="氏名・メールアドレス・お問い合わせ内容" />
            </div>
            <div class="toolbar-field">
              <label for="inquiry-filter-date">日付絞り込み</label>
              <input type="date" id="inquiry-filter-date" />
            </div>
            <div class="toolbar-field">
              <label for="inquiry-filter-status">ステータス</label>
              <select id="inquiry-filter-status">
                <option value="">すべて</option>
                <option value="未対応">未対応</option>
                <option value="対応中">対応中</option>
                <option value="完了">完了</option>
              </select>
            </div>
            <div class="toolbar-actions">
              <button type="button" class="secondary-btn" id="inquiry-reset-filter-btn">条件をクリア</button>
            </div>
          </div>
        </section>

        <section class="table-card">
          <div class="table-header">
            <div>
              <h3>お問い合わせ一覧</h3>
              <p id="inquiry-result-count">0件を表示中</p>
            </div>
          </div>

          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>氏名</th>
                  <th>受信日</th>
                  <th>件名</th>
                  <th>ステータス</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="inquiry-tbody"></tbody>
            </table>
          </div>

          <div class="pagination-bar">
            <button type="button" class="page-btn" id="inquiry-prev-page">前へ</button>
            <div class="page-numbers" id="inquiry-page-numbers"></div>
            <button type="button" class="page-btn" id="inquiry-next-page">次へ</button>
          </div>
        </section>
      </section>
    </main>
  </div>

  <div class="modal-backdrop hidden" id="reservation-modal">
    <div class="modal-panel">
      <div class="modal-header">
        <div>
          <p class="page-eyebrow">Reservation Detail</p>
          <h3 id="reservation-modal-title">予約詳細</h3>
        </div>
        <button type="button" class="icon-btn" id="close-reservation-modal" aria-label="閉じる">×</button>
      </div>

      <form id="reservation-form" class="modal-form">
        <input type="hidden" id="reservation-id" />
        <div class="detail-grid">
          <div class="modal-field">
            <label for="customer-name">予約者名</label>
            <input type="text" id="customer-name" />
          </div>
          <div class="modal-field">
            <label for="customer-email">メールアドレス</label>
            <input type="email" id="customer-email" />
          </div>
          <div class="modal-field">
            <label for="customer-phone">電話番号</label>
            <input type="text" id="customer-phone" />
          </div>
          <div class="modal-field">
            <label for="reservation-date">予約日</label>
            <input type="date" id="reservation-date" />
          </div>
          <div class="modal-field">
            <label for="reservation-time">時間</label>
            <select id="reservation-time">
              <option value="11:00">11:00</option>
              <option value="13:00">13:00</option>
              <option value="15:00">15:00</option>
            </select>
          </div>
          <div class="modal-field">
            <label for="reservation-people">人数</label>
            <input type="number" id="reservation-people" min="1" max="8" />
          </div>
          <div class="modal-field">
            <label for="reservation-status">ステータス</label>
            <select id="reservation-status">
              <option value="予約確定">予約確定</option>
              <option value="仮予約">仮予約</option>
              <option value="来店済み">来店済み</option>
              <option value="キャンセル">キャンセル</option>
            </select>
          </div>
          <div class="modal-field modal-field-wide">
            <label for="reservation-note">予約内容</label>
            <textarea id="reservation-note" rows="4"></textarea>
          </div>
        </div>

        <div class="modal-actions">
          <div></div>
          <div class="modal-submit">
            <button type="button" class="secondary-btn" id="complete-reservation-btn">完了</button>
            <button type="button" class="secondary-btn" id="delete-reservation-btn">削除</button>
            <button type="submit" class="primary-btn">保存する</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-backdrop hidden" id="inquiry-modal">
    <div class="modal-panel">
      <div class="modal-header">
        <div>
          <p class="page-eyebrow">Inquiry Detail</p>
          <h3 id="inquiry-modal-title">お問い合わせ詳細</h3>
        </div>
        <button type="button" class="icon-btn" id="close-inquiry-modal" aria-label="閉じる">×</button>
      </div>

      <form id="inquiry-form" class="modal-form">
        <input type="hidden" id="inquiry-id" />
        <div class="detail-grid">
          <div class="modal-field">
            <label for="inquiry-name">氏名</label>
            <input type="text" id="inquiry-name" />
          </div>
          <div class="modal-field">
            <label for="inquiry-email">メールアドレス</label>
            <input type="email" id="inquiry-email" />
          </div>
          <div class="modal-field">
            <label for="inquiry-phone">電話番号</label>
            <input type="text" id="inquiry-phone" />
          </div>
          <div class="modal-field">
            <label for="inquiry-date">受信日</label>
            <input type="date" id="inquiry-date" />
          </div>
          <div class="modal-field">
            <label for="inquiry-subject">件名</label>
            <input type="text" id="inquiry-subject" />
          </div>
          <div class="modal-field">
            <label for="inquiry-status">ステータス</label>
            <select id="inquiry-status">
              <option value="未対応">未対応</option>
              <option value="対応中">対応中</option>
              <option value="完了">完了</option>
            </select>
          </div>
          <div class="modal-field modal-field-wide">
            <label for="inquiry-message">お問い合わせ内容</label>
            <textarea id="inquiry-message" rows="5"></textarea>
          </div>
        </div>

        <div class="modal-actions">
          <div></div>
          <div class="modal-submit">
            <button type="button" class="secondary-btn" id="complete-inquiry-btn">完了</button>
            <button type="button" class="secondary-btn" id="delete-inquiry-btn">削除</button>
            <button type="submit" class="primary-btn">保存する</button>
          </div>
        </div>
      </form>
    </div>
  </div>
</body>

</html>
